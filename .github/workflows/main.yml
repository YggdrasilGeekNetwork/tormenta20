name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  spec:
    name: Specs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.6"
          bundler-cache: true

      - name: Run specs and RuboCop
        run: bundle exec rake
        env:
          COVERAGE: "true"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}

  jsonlint:
    name: JSON Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Install JSON Lint
        run: gem install jsonlint

      - name: Lint JSON files
        run: find src/json -name "*.json" | xargs jsonlint

  publish:
    name: Publish to RubyGems
    if: github.event_name == 'release'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version

      - name: Publish gem
        env:
          GEM_VERSION: ${{ github.event.release.tag_name }}
        run: |
          mkdir -p ~/.gem
          printf -- "---\n:rubygems_api_key: %s\n" "${{ secrets.RUBYGEMS_API_KEY }}" > ~/.gem/credentials
          chmod 0600 ~/.gem/credentials
          bundle exec rake build_db
          gem build tormenta20.gemspec
          gem push tormenta20-*.gem
